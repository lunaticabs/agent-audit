name: Lint Workflows

on:
  pull_request:
    paths:
      - ".github/workflows/**"
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: lint-workflows-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run actionlint
        run: |
          docker run --rm \
            --volume "${PWD}:/repo" \
            --workdir /repo \
            rhysd/actionlint:1.7.12 \
            -color

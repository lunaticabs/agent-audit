common: &common_settings
  start: agent-audit-codex/start.sh
  instruction_file_name: AGENTS.md
  gateway_sni_hosts:
    - apiapi.chat
    - api.openai.com
    - chatgpt.com

agent-audit-codex:
  <<: *common_settings
  env_vars:
    APIAPI_API_KEY: ${{ secrets.APIAPI_API_KEY }}
    MODEL: gpt-5.4
    REASONING_EFFORT: xhigh
    AGENT_AUDIT_PROJECT_ROOT: /opt/agent-audit
    AGENT_AUDIT_EVAL_ENTRYPOINT: /opt/agent-audit/eval/start.sh
    CODEX_RUNNER_DIR: /opt/agent-audit/codex-runner

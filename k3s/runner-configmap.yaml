apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-audit-runner-config
  namespace: agent-audit
data:
  DISPATCHER_RUNNER_IMAGE: ghcr.io/lunaticabs/agent-audit:main
  DISPATCHER_RUNNER_ENV_SECRET: agent-audit-runner-env
  DISPATCHER_RUNNER_IMAGE_PULL_SECRET: ""
  DISPATCHER_RUNNER_JOB_PULL_POLICY: IfNotPresent
  DISPATCHER_RUNNER_JOB_TTL_SECONDS: "3600"
  DISPATCHER_RUNNER_JOB_CPU_REQUEST: "500m"
  DISPATCHER_RUNNER_JOB_CPU_LIMIT: "2000m"
  DISPATCHER_RUNNER_JOB_MEMORY_REQUEST: "1Gi"
  DISPATCHER_RUNNER_JOB_MEMORY_LIMIT: "4Gi"
  DISPATCHER_RUNNER_RUNS_VOLUME_SIZE_LIMIT: "10Gi"

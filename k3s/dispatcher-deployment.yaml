apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-audit-dispatcher
  namespace: agent-audit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-audit-dispatcher
  template:
    metadata:
      labels:
        app: agent-audit-dispatcher
    spec:
      serviceAccountName: agent-audit-dispatcher
      containers:
        - name: dispatcher
          image: ghcr.io/replace-me/agent-audit-dispatcher:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: agent-audit-dispatcher-config
            - secretRef:
                name: agent-audit-dispatcher-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

apiVersion: v1
kind: Secret
metadata:
  name: agent-audit-runner-env
  namespace: agent-audit
type: Opaque
stringData:
  APIAPI_API_KEY: replace-me
  AGENT_AUDIT_SOURCE_API_BASE: https://api.example.com
  AGENT_AUDIT_SOURCE_API_KEY: replace-me
  AGENT_AUDIT_SOURCE_HEADERS_JSON: '{"Authorization":"Bearer replace-me"}'
  AGENT_AUDIT_RPC_URL: https://rpc.example.com
  AGENT_AUDIT_MONGO_URI: mongodb://mongo.example.com:27017
  AGENT_AUDIT_MONGO_DB: agent_audit
  AGENT_AUDIT_MONGO_RUNS_META_COLLECTION: runs_meta
  AGENT_AUDIT_MONGO_RUNS_FILES_COLLECTION: runs_files
  AGENT_AUDIT_MONGO_MAX_INLINE_FILE_BYTES: "8388608"

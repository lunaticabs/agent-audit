apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-audit-dispatcher
  namespace: agent-audit
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-audit-dispatcher
  namespace: agent-audit
rules:
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - delete
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-audit-dispatcher
  namespace: agent-audit
subjects:
  - kind: ServiceAccount
    name: agent-audit-dispatcher
    namespace: agent-audit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agent-audit-dispatcher
